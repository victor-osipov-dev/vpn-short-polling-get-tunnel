# ============================================================
# vpn-poller config
# mode: "client" или "server" — определяет, какая роль стартует
# ============================================================
mode: client

client:
  socks5:
    bind_host: 127.0.0.1
    bind_port: 8888          
  server_url: "http://127.0.0.1:8443/poll"
  poll_interval_ms: 1000      # базовый интервал опроса
  poll_jitter_ms: 50         # случайный разброс, чтобы трафик не был метрономом
  max_chunk_bytes: 4096      # максимум байт payload на один кадр за один poll
  verify_tls: false           # false — только для локального теста с самоподписанным сертификатом

server:
  bind_host: 0.0.0.0
  bind_port: 8443
  max_chunk_bytes: 4096
  idle_timeout_seconds: 2000   # через сколько секунд неактивности клиент считается отвалившимся
  tls:
    cert: ""                  # путь к fullchain.pem (пусто = сервер работает по HTTP, только для теста)
    key: ""                   # путь к privkey.pem

security:
  # Общий preshared key. Сгенерировать: python crypto_utils.py
  psk: "vTvesbK6BIh+ZPJf6pn4b+s7F+RvMi9ulrkFlPfX2qo="
  hmac_window_seconds: 30      # окно допуска по времени для anti-replay защиты

logging:
  level: DEBUG  # в обоих config files
